name: Build Android APK

# Builds on main AND on working branches (claude/**) so every push
# produces a testable APK — testing an old artifact looks exactly like
# "the new feature doesn't load".
on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Download Godot 4.4
        run: |
          wget -q -O godot.zip "https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_linux.x86_64.zip"
          unzip -q godot.zip
          chmod +x Godot_v4.4-stable_linux.x86_64

      - name: Download Export Templates
        run: |
          wget -q -O templates.tpz "https://github.com/godotengine/godot/releases/download/4.4-stable/Godot_v4.4-stable_export_templates.tpz"
          unzip -q templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.4.stable
          cp templates/* ~/.local/share/godot/export_templates/4.4.stable/

      - name: Generate Debug Keystore
        run: |
          mkdir -p ~/.local/share/godot/keystores
          keytool -genkey -v -keystore ~/.local/share/godot/keystores/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Pre-heat Godot Cache
        run: |
          ./Godot_v4.4-stable_linux.x86_64 --headless --import --path . || true

      - name: Validate scripts and scenes
        run: |
          ./Godot_v4.4-stable_linux.x86_64 --headless --path . -s tools/validate_scripts.gd 2>&1 | tee validate.log
          if grep -E "SCRIPT ERROR|Parse Error|FAILED to load|FAILED to instantiate" validate.log; then
            echo "::error::Script/scene errors detected — see validate.log above"
            exit 1
          fi

      - name: Animation smoke test
        run: |
          ./Godot_v4.4-stable_linux.x86_64 --headless --path . -s tools/debug_animations.gd 2>&1 | tee anim_debug.log
          if ! grep -q "ANIMATION_OK" anim_debug.log; then
            echo "::error::Character animation broken — see anim_debug.log above"
            exit 1
          fi

      - name: Build APK (Debug)
        run: |
          mkdir -p build
          ./Godot_v4.4-stable_linux.x86_64 --headless --install-android-build-template --export-debug "Android" build/zombie_outbreak-debug.apk --path .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        # Don't fail the whole run if artifact storage is full — the real
        # signal is that validation + build succeeded above. Short
        # retention + overwrite keeps storage from filling again.
        continue-on-error: true
        with:
          name: zombie-outbreak-apk
          path: build/*.apk
          retention-days: 1
          overwrite: true
